name: NestJs CI 

on: 
  push: 
    branches:
      - main

jobs:
  build: 
    runs-on: ubuntu-latest

    steps: 
      - name: checkout code
        uses: actions/checkout@v4

      - name: pnpm setup
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install pnpm Dependencies globally 
        run: npm install -g pnpm

      - name: Install node modules
        run: pnpm install

      - name: Build Project
        run: pnpm run build

      - name: Run Tests
        run: pnpm test   