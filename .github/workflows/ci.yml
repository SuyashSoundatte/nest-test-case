name: NestJs CI 

on: 
  push: 
    branches:
      - main

jobs:
  build: 
    runs-on: ubuntu-latest
    environment: uat-test-case

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps: 
      - name: checkout code
        uses: actions/checkout@v4

      - name: pnpm setup
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install node modules
        run: pnpm install

      - name: docker service start
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            docker exec nest_postgres pg_isready -U postgres && echo "Postgres ready" && exit 0
            echo "Waiting for Postgres..."
            sleep 3
          done
          echo "Postgres failed to start..."
          exit 1    

      - name: Run migrations for prisma
        run: pnpm prisma migrate deploy

      - name: Build Project
        run: pnpm run build

      - name: Run Tests
        run: pnpm test   

      - name: Stop containers
        if: always()
        run: docker compose down  
