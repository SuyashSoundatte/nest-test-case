name: NestJs CI 

on: 
  push: 
    branches:
      - main

jobs:
  build: 
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nest_db?schema=public
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: nest_db

    steps: 
      - name: checkout code
        uses: actions/checkout@v4

      - name: pnpm setup
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install pnpm Dependencies globally 
        run: npm install -g pnpm

      - name: Install node modules
        run: pnpm install

      - name: Start Docker services
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres ready" && exit 0
            echo "Waiting for Postgres..."
            sleep 3
          done
          exit 1

      - name: Run migrations for prisma
        run: pnpm prisma migrate deploy

      - name: Build Project
        run: pnpm run build

      - name: Run Tests
        run: pnpm test   

      - name: Stop containers
        if: always()
        run: docker compose down  